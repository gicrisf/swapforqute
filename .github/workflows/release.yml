name: Create Release

on:
  push:
    tags:
      - 'v*'  # Triggers on any tag starting with 'v' (e.g., v1.0.0, v2.1.3)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Release Notes
        id: release_notes
        run: |
          if [ -f "RELEASE_NOTES.md" ]; then
            echo "Using RELEASE_NOTES.md"
            echo "body_path=RELEASE_NOTES.md" >> $GITHUB_OUTPUT
          else
            echo "No RELEASE_NOTES.md found - using default template"
            echo "## Release ${{ github.ref_name }}" > release_notes.md
            echo "" >> release_notes.md
            echo "See commit history for changes." >> release_notes.md
            echo "body_path=release_notes.md" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: ${{ steps.release_notes.outputs.body_path }}
          files: sfq.py
